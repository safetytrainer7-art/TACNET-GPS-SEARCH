<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TACNET</title>
    <style>
        /* Base setup to ensure no white screens */
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #064e3b; font-family: sans-serif; overflow: hidden; }
        
        #app-container { width: 100%; max-width: 400px; height: 100vh; margin: auto; position: relative; }

        /* Brightened background image */
        #bg { 
            position: absolute; width: 100%; height: 100%; 
            background-image: url('IMAGE FOR TAC.png2.jpg');
            background-size: cover; background-position: center;
            filter: brightness(1.7) contrast(0.9); z-index: 0; 
        }

        /* HIDE THE CHECKBOX */
        #portal-toggle { display: none; }

        /* LAYERS */
        .page { 
            position: absolute; width: 100%; height: 100%; 
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 1; background: rgba(0,0,0,0.4);
        }

        /* PAGE 2 IS HIDDEN BY DEFAULT */
        #page-access { display: none; background: rgba(0,0,0,0.8); }

        /* THE MAGIC: When checkbox is checked, switch the pages */
        #portal-toggle:checked ~ #page-landing { display: none; }
        #portal-toggle:checked ~ #page-access { display: flex; }

        .btn { 
            background: #1e40af; color: white; padding: 25px 40px; border: 3px solid white; 
            border-radius: 12px; font-size: 1.5rem; font-weight: 900; cursor: pointer; text-transform: uppercase;
        }
    </style>
</head>
<body>

<div id="app-container">
    <div id="bg"></div>

    <input type="checkbox" id="portal-toggle">

    <div class="page" id="page-landing">
        <h1 style="color: white; font-size: 3rem;">TACNET</h1>
        <label for="portal-toggle" class="btn">INITIALIZE PORTAL</label>
    </div>

    <div class="page" id="page-access">
        <h1 style="color: #facc15; font-size: 3rem;">ACCESS GRANTED</h1>
        <p style="color: white; font-size: 1.5rem;">COMMAND LINK ESTABLISHED</p>
    </div>
</div>

</body>
</html>
