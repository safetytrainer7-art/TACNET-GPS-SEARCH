<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>TACNET Command Center</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <script src="https://cdn.jsdelivr.net/npm/appwrite@16.0.0"></script>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        body { margin: 0; display: flex; height: 100vh; font-family: sans-serif; background: #0b2512; }
        #sidebar { width: 320px; background: #0b2512; color: #fff; padding: 20px; display: flex; flex-direction: column; gap: 10px; border-right: 2px solid #2a5a3a; }
        #map { flex-grow: 1; }
        button { padding: 12px; background: #2a5a3a; color: white; border: 1px solid #4a7a5a; cursor: pointer; font-weight: bold; text-align: left; }
        .nvg-active { filter: sepia(100%) hue-rotate(80deg) brightness(0.6) contrast(1.5); }
        /* Legend Styles */
        .legend { background: white; color: black; padding: 10px; border-radius: 5px; }
    </style>
</head>
<body>

<div id="sidebar">
    <h2>TACNET V1</h2>
    <button onclick="toggleNVG()">TOGGLE NVG MODE</button>
    <button onclick="addHelipad()">PLACE HELIPAD</button>
    <button onclick="activateRNG()">RNG MEASUREMENT (ORANGE)</button>
    <button onclick="triggerTrapTrace()">TRAP AND TRACE</button>
    <button onclick="triggerK9Medical()">K9 VOICE PROTOCOLS</button>
    <button onclick="window.print()">GENERATE REPORT</button>
    <div id="status" style="margin-top:20px; font-size: 0.8em; color: #aaa;">System: Tracking Active</div>
</div>
<div id="map"></div>

<script>
    const client = new Appwrite.Client()
        .setEndpoint('https://nyc.cloud.appwrite.io/v1')
        .setProject('6a38e834003e0cc64c31');
    const databases = new Appwrite.Databases(client);
    
    const map = L.map('map').setView([37.5407, -77.4360], 15);
    L.tileLayer('https://server.arcgisonline.com/arcgis/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}').addTo(map);

    // 1. Searcher Legend (Standardized Colors)
    const legend = L.control({position: 'bottomright'});
    legend.onAdd = function() {
        const div = L.DomUtil.create('div', 'legend');
        div.innerHTML = '<b>Unit Legend</b><br>🟢 K9<br>🔵 Water Rescue<br>🔴 Fire/Rescue';
        return div;
    };
    legend.addTo(map);

    // 2. Real-Time Tracking
    const teamMarkers = {};
    client.subscribe('databases.tacnet_telemetry_db.collections.tacnet_live_units.documents', res => {
        const u = res.payload;
        if(teamMarkers[u.$id]) teamMarkers[u.$id].setLatLng([u.lat, u.lng]);
        else teamMarkers[u.$id] = L.marker([u.lat, u.lng]).addTo(map).bindPopup(u.callSign);
    });

    // 3. Orange RNG Tool (Auto-Measuring)
    function activateRNG() {
        let points = [];
        map.on('click', e => {
            points.push(e.latlng);
            if(points.length === 2) {
                const dist = points[0].distanceTo(points[1]).toFixed(0);
                L.polyline(points, {color: 'orange', weight: 5}).addTo(map)
                 .bindPopup("Distance: " + dist + " meters").openPopup();
                points = [];
                map.off('click');
            }
        });
    }

    function toggleNVG() { document.getElementById('map').classList.toggle('nvg-active'); }
    function addHelipad() { map.once('click', e => L.marker(e.latlng).bindPopup("HELIPAD").addTo(map)); }
    function triggerTrapTrace() { alert("Trap and Trace active."); }
    function triggerK9Medical() { alert("Voice Protocol: K9 trauma instructions initiated."); }
</script>
</body>
</html>
