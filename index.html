<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>TACNET // LIVE COMMAND GRID</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        body, html { margin: 0; height: 100%; font-family: sans-serif; background: #051a0a; color: #f1d279; }
        #app-container { display: flex; height: 100vh; }
        #sidebar { width: 300px; background: #0b2210; border-right: 2px solid #f1d279; padding: 20px; }
        #map { flex-grow: 1; }
        .btn { background: #f1d279; color: #020803; border: none; padding: 10px; width: 100%; cursor: pointer; font-weight: bold; margin-bottom: 10px; }
    </style>
</head>
<body>
    <div id="app-container">
        <div id="sidebar">
            <h2>TACNET COMMAND</h2>
            <input type="text" id="username" placeholder="Officer Name" style="width:100%; padding:8px; margin-bottom:10px;">
            <button class="btn" onclick="deployOfficer()">DEPLOY ON GRID</button>
            <div id="roster"></div>
        </div>
        <div id="map"></div>
    </div>

    <script>
        const map = L.map('map').setView([37.525, -79.05], 14);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
        const markers = {};

        function deployOfficer() {
            const name = document.getElementById('username').value;
            if(!name) return;
            
            const marker = L.marker([37.525 + (Math.random()*0.01), -79.05 + (Math.random()*0.01)]).addTo(map);
            marker.bindPopup(`<b>${name}</b><br>STATUS: ACTIVE`).openPopup();
            
            markers[name] = marker;
            document.getElementById('roster').innerHTML += `<div style="border-bottom:1px solid #f1d279; padding:5px;">${name} - ONLINE</div>`;
        }
    </script>
</body>
</html>
