<!DOCTYPE html>
<html>
<head>
    <title>TACNET</title>
    <style>
        body { margin: 0; padding: 0; background-color: #064e3b; color: white; font-family: sans-serif; }
        .container { width: 100%; max-width: 480px; margin: 0 auto; text-align: center; padding-top: 100px; }
        .btn { background: blue; color: white; padding: 20px; font-size: 20px; cursor: pointer; border: 2px solid white; }
    </style>
</head>
<body>

<div class="container" id="page1">
    <h1>TACNET</h1>
    <p>System Status: Standby</p>
    <button class="btn" onclick="document.getElementById('page1').style.display='none'; document.getElementById('page2').style.display='block';">INITIALIZE PORTAL</button>
</div>

<div class="container" id="page2" style="display:none;">
    <h1 style="color: yellow;">ACCESS GRANTED</h1>
    <p>Systems are now operational.</p>
</div>

</body>
</html>
