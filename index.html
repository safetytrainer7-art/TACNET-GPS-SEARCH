<!-- Integrated Master TACNET File -->
<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        body { margin: 0; display: flex; height: 100vh; background: #0b2512; color: white; overflow: hidden; }
        #sidebar { width: 300px; padding: 10px; overflow-y: auto; background: #0b2512; z-index: 1000; }
        #map { flex-grow: 1; }
        /* Mobile Scaling */
        @media (max-width: 600px) { #sidebar { width: 100%; position: absolute; height: 30%; } }
        .legend-bar { position: absolute; bottom: 10px; left: 310px; background: #1a1a1a; padding: 5px; z-index: 1000; font-size: 10px; }
    </style>
</head>
<body>

<div id="sidebar">
    <h3>TACNET COMMAND</h3>
    <input type="text" id="address" placeholder="Search Address...">
    <button onclick="goToAddress()">GO</button>
    <button onclick="toggleLock()">LOCK/UNLOCK MAP</button>
    <button onclick="toggleDraw()">DRAW MODE</button>
    <button onclick="undo()">ERASER</button>
    <button onclick="toggleTrapTrace()">TRAP & TRACE</button>
    <hr>
    <h4>K9 VOICE</h4>
    <button onclick="playAudio('CPR')">CPR</button>
    <textarea id="notes" placeholder="Case Notes..."></textarea>
    <button onclick="printReport()">PRINT REPORT</button>
</div>

<div id="map"></div>

<script>
    const map = L.map('map').setView([37.5407, -77.4360], 15);
    // Three-View Selection
    const baseMaps = {
        "Streets": L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png'),
        "Satellite": L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}'),
        "Terrain": L.tileLayer('https://{s}.tile.opentopomap.org/{z}/{x}/{y}.png')
    };
    baseMaps.Satellite.addTo(map);
    L.control.layers(baseMaps).addTo(map);

    // Perimeter & Target
    let target, perimeter;
    function goToAddress() {
        // Mock geocoding logic for demonstration
        if(target) map.removeLayer(target);
        target = L.circleMarker([37.5407, -77.4360], {color: 'red'}).addTo(map);
        perimeter = L.circle([37.5407, -77.4360], {radius: 50, color: 'green'}).addTo(map);
    }
</script>
</body>
</html>
