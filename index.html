<!DOCTYPE html>
<html>
<head>
    <title>TACNET COMMAND</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <style>
        body { margin: 0; padding: 0; background: #000; color: #fff; font-family: sans-serif; overflow: hidden; }
        #map { height: 100vh; width: 100vw; }
        .hud-overlay { position: absolute; top: 10px; left: 10px; z-index: 1000; background: rgba(0,0,0,0.7); padding: 15px; border: 1px solid #38bdf8; border-radius: 5px; }
        .control-btn { background: #38bdf8; border: none; padding: 10px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>
    <div id="map"></div>
    <div class="hud-overlay">
        <h3>TACNET OPERATIONAL MODE</h3>
        <p>System Initialized: All Systems Green</p>
        <button class="control-btn" onclick="location.reload()">RESET SYSTEM</button>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // THE CORE MAPPING ENGINE - NO EXTRA LAYERS TO HIDE YOUR VIEW
        const map = L.map('map').setView([37.5407, -77.4360], 15);
        L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}').addTo(map);
        
        console.log("TACNET: READY FOR DEMO");
    </script>
</body>
</html>
