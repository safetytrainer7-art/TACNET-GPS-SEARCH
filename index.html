<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>TACNET // COMMAND MATRIX</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        body { margin: 0; display: flex; height: 100vh; background: #020803; color: #f1d279; font-family: monospace; }
        #sidebar { width: 300px; background: #0b2210; padding: 15px; border-right: 2px solid #f1d279; }
        #map-area { flex-grow: 1; display: flex; flex-direction: column; }
        #tools-bar { height: 50px; background: #0b2210; border-bottom: 2px solid #f1d279; display: flex; align-items: center; padding: 0 10px; }
        #map { flex-grow: 1; }
        .tactical-btn { background: #f1d279; color: #020803; border: none; padding: 10px; width: 100%; margin-top: 10px; cursor: pointer; font-weight: bold; }
        .sos-btn { background: #9c2424; color: white; }
    </style>
</head>
<body>
    <div id="sidebar">
        <h2>TACNET COMMAND</h2>
        <input type="text" id="officerName" placeholder="Enter Officer Name" style="width:90%; padding:5px;">
        <button class="tactical-btn" onclick="addOfficer()">DEPLOY UNIT</button>
        <hr>
        <h3>ROSTER</h3>
        <div id="rosterList"></div>
        <hr>
        <h3>LEGEND</h3>
        <div style="font-size: 0.8em;">
            • BLUE: HQ COMMAND<br>• RED: ACTIVE TRACKER<br>• ORANGE: K9 UNIT
        </div>
        <button class="tactical-btn sos-btn" onclick="alert('SOS SIGNAL BROADCASTING!')">SOS EMERGENCY</button>
    </div>
    <div id="map-area">
        <div id="tools-bar">
            <input type="text" id="addressSearch" placeholder="Enter Target Address..." style="width:70%; padding:5px;">
            <button class="tactical-btn" style="margin:0 0 0 10px; width: 60px;" onclick="searchAddress()">GO</button>
        </div>
        <div id="map"></div>
    </div>

    <script>
        const map = L.map('map').setView([37.525, -79.05], 13);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

        function addOfficer() {
            const name = document.getElementById('officerName').value;
            if(!name) return;
            const marker = L.marker([37.525 + (Math.random()*0.01), -79.05 + (Math.random()*0.01)]).addTo(map);
            marker.bindPopup(`<b>${name}</b>`).openPopup();
            document.getElementById('rosterList').innerHTML += `<div>• ${name} [ONLINE]</div>`;
        }

        function searchAddress() {
            const addr = document.getElementById('addressSearch').value;
            alert("Locating target: " + addr);
            map.setView([37.53, -79.06], 15);
        }
    </script>
</body>
</html>
