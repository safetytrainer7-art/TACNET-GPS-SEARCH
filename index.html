<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TACNET - System Override</title>
    <style>
        /* FORCE PORTRAIT LOCK */
        html, body {
            margin: 0; padding: 0; width: 100%; height: 100%;
            display: flex; justify-content: center; background: #000;
        }
        #app-container {
            width: 100%; max-width: 480px; height: 100vh;
            background: #020617; position: relative; overflow: hidden;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }

        /* IMAGE SCALING FIX: 'contain' keeps it inside the box perfectly */
        #hero-bg {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background-image: url('IMAGE FOR TAC.png2.jpg');
            background-size: contain; background-position: center; background-repeat: no-repeat;
            opacity: 0.3; z-index: 0;
        }

        .ui-layer { z-index: 10; text-align: center; width: 90%; }
        button {
            background: #1d4ed8; color: white; padding: 20px 40px;
            border: 2px solid white; border-radius: 10px;
            font-size: 1.2rem; cursor: pointer; font-weight: bold;
        }
    </style>
</head>
<body>

<div id="app-container">
    <div id="hero-bg"></div>
    
    <div class="ui-layer" id="screen1">
        <h1 style="color: white; font-family: sans-serif;">TACNET</h1>
        <button onclick="document.getElementById('screen1').style.display='none'; document.getElementById('screen2').style.display='block';">
            INITIALIZE PORTAL
        </button>
    </div>

    <div class="ui-layer" id="screen2" style="display:none;">
        <h2 style="color: #22c55e;">SYSTEM ACCESS GRANTED</h2>
        <p style="color: white;">Interface operational.</p>
    </div>
</div>

</body>
</html>
