<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TACNET | Operational Command</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; font-family: 'Segoe UI', sans-serif; background: #000; color: #fff; }
        #map { height: 100vh; width: 100vw; z-index: 1; }
        
        /* Tactical HUD - Cleaned and Optimized */
        .hud-overlay { position: absolute; top: 15px; left: 15px; z-index: 1000; background: rgba(0,0,0,0.85); padding: 15px; border: 2px solid #38bdf8; border-radius: 8px; pointer-events: auto; }
        .btn-tac { background: #38bdf8; border: none; padding: 10px; cursor: pointer; font-weight: bold; margin-top: 5px; width: 100%; }
        
        /* Operational Asset Drawer */
        .asset-drawer { position: absolute; bottom: 20px; left: 10px; right: 10px; background: rgba(0,0,0,0.9); padding: 10px; border-radius: 8px; z-index: 1000; display: flex; gap: 10px; overflow-x: auto; }
        
        /* Tactical Overlays */
        .nvg-filter { position: absolute; top:0; left:0; width:100%; height:100%; background: rgba(34, 197, 94, 0.2); pointer-events: none; z-index: 998; display: none; }
    </style>
</head>
<body>

    <div id="nvg-filter" class="nvg-filter"></div>
    <div id="map"></div>

    <div class="hud-overlay">
        <h3>TACNET: COMMAND</h3>
        <p>Status: MULTI-AGENCY ACTIVE</p>
        <button class="btn-tac" onclick="location.reload()">RESET SYSTEM</button>
        <button class="btn-tac" onclick="document.getElementById('nvg-filter').style.display = (document.getElementById('nvg-filter').style.display === 'block' ? 'none' : 'block')">TOGGLE NVG</button>
    </div>

    <div class="asset-drawer">
        <button onclick="console.log('Deploy: K9')">DEPLOY K9</button>
        <button onclick="console.log('Deploy: LE')">DEPLOY LE</button>
        <button onclick="console.log('Deploy: HELIPAD')">MARK HELIPAD</button>
        <button onclick="console.log('Action: Trap and Trace')">TRAP & TRACE</button>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        const map = L.map('map').setView([37.5407, -77.4360], 15);
        L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}').addTo(map);
        
        // High-Visibility Orange Perimeter
        L.circle([37.5407, -77.4360], { color: '#f97316', weight: 4, radius: 500 }).addTo(map);
        
        console.log("TACNET: SYSTEM STABILIZED - READY FOR DEMONSTRATION");
    </script>
</body>
</html>
