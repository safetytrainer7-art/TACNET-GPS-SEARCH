<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TACNET OPS</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #064e3b; overflow: hidden; }
        #container { width: 100%; max-width: 400px; height: 100vh; margin: auto; position: relative; }
        
        .screen { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background-size: cover; background-position: center; display: flex;
            justify-content: center; align-items: center;
        }

        /* Screen 1: Landing */
        #s1 { background-image: url('DDED.jpg'); z-index: 2; }
        
        /* Screen 2: Access */
        #s2 { background-image: url('EEED.jpg'); z-index: 1; }

        /* The Button */
        button { 
            background: #1e40af; color: white; padding: 25px 40px; 
            border: 3px solid white; border-radius: 12px;
            font-size: 1.5rem; font-weight: 900; cursor: pointer; text-transform: uppercase;
        }
    </style>
</head>
<body>

<div id="container">
    <div id="s1" class="screen">
        <button onclick="document.getElementById('s1').style.display='none'">INITIALIZE PORTAL</button>
    </div>
    <div id="s2" class="screen"></div>
</div>

</body>
</html>
