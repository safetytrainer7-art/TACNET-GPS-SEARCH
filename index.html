<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TACNET | MULTI-AGENCY COMMAND</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; font-family: sans-serif; overflow: hidden; }
        .screen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: none; z-index: 10; }
        #s1 { display: flex; background: url('DDED.jpg') no-repeat center/cover; justify-content: center; align-items: center; }
        #s2 { background: url('EEED.jpg') no-repeat center/cover; flex-direction: column; justify-content: center; align-items: center; }
        #map { width: 100%; height: 100%; }
        
        /* Tactical HUD Elements */
        .hud-overlay { position: absolute; top: 10px; left: 10px; z-index: 1000; background: rgba(0,0,0,0.7); padding: 10px; border-radius: 8px; color: #fff; }
        .btn-tac { background: #1e40af; color: white; padding: 15px 25px; border: 2px solid white; cursor: pointer; border-radius: 8px; font-weight: bold; }
    </style>
</head>
<body>

    <div id="s1" class="screen">
        <button class="btn-tac" onclick="document.getElementById('s1').style.display='none'; document.getElementById('s2').style.display='flex';">INITIALIZE PORTAL</button>
    </div>

    <div id="s2" class="screen">
        <h2 style="color:white;">COMMAND HUB</h2>
        <button class="btn-tac" onclick="launchMap()">LAUNCH MAP MATRIX</button>
    </div>

    <div id="s3" class="screen">
        <div id="map"></div>
        <div class="hud-overlay">
            <button onclick="alert('RNG Active: Measure Distance')">ORANGE RNG</button>
            <button onclick="toggleMapLock()">MAP LOCK</button>
            <button onclick="toggleNVG('green')">GREEN NVG</button>
            <button onclick="toggleNVG('red')">RED NVG</button>
        </div>
    </div>

    <script>
        function launchMap() {
            document.getElementById('s2').style.display = 'none';
            document.getElementById('s3').style.display = 'block';
            var map = L.map('map').setView([37.5, -77.4], 14);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
        }

        function toggleMapLock() { /* Logic for freezing map interaction */ }
        function toggleNVG(color) { /* Toggle screen filter overlay */ }
    </script>
</body>
</html>
