<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TACNET COMMAND</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; }
        #app-container { width: 100%; max-width: 400px; height: 100vh; margin: auto; position: relative; }

        /* THE IMAGE LAYERS */
        .page { 
            position: absolute; width: 100%; height: 100%; top: 0; left: 0;
            background-size: cover; background-position: center;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
        }

        #landing { background-image: url('DDED.jpg'); z-index: 2; }
        #access { background-image: url('EEED.jpg'); z-index: 1; }

        /* THE TOGGLE HACK */
        #portal-toggle { display: none; }
        #portal-toggle:checked ~ #landing { display: none; }

        /* BUTTON STYLING */
        .btn { 
            background: #1e40af; color: white; padding: 20px 40px; 
            border: 3px solid white; border-radius: 12px;
            font-size: 1.5rem; font-weight: 900; cursor: pointer; text-transform: uppercase;
            margin-top: 50%; /* Positions button correctly over the design */
        }
    </style>
</head>
<body>

<div id="app-container">
    <input type="checkbox" id="portal-toggle">

    <!-- LANDING PAGE -->
    <div class="page" id="landing">
        <label for="portal-toggle" class="btn">INITIALIZE PORTAL</label>
    </div>

    <!-- ACCESS PAGE -->
    <div class="page" id="access">
        <!-- The image EEED.jpg is already set as the background -->
    </div>
</div>

</body>
</html>
