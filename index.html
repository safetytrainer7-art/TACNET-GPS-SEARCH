<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>TACNET Command Center</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.css"/>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.js"></script>
    <style>
        body { margin: 0; display: flex; height: 100vh; background: #0b2512; color: white; font-family: sans-serif; }
        #sidebar { width: 320px; padding: 15px; border-right: 2px solid #2a5a3a; overflow-y: auto; }
        #map { flex-grow: 1; }
        .legend-bar { position: absolute; bottom: 10px; left: 330px; background: #1a1a1a; padding: 10px; display: flex; gap: 10px; overflow-x: auto; white-space: nowrap; z-index: 1000; }
        button { background: #2a5a3a; color: white; border: none; padding: 10px; width: 100%; margin-bottom: 5px; cursor: pointer; }
    </style>
</head>
<body>

<div id="sidebar">
    <h3>TACNET COMMAND</h3>
    <input type="text" id="address" placeholder="Enter address..." style="width:100%; padding:8px;">
    <button onclick="geocode()">GO</button>
    <button onclick="toggleNVG('red')">RED NVG</button>
    <button onclick="toggleNVG('green')">GREEN NVG</button>
    <button id="sos" onclick="triggerSOS()" style="background:red;">SOS ALERT (OFF)</button>
    <button onclick="terminateSearch()" style="background:black;">TERMINATE SEARCH</button>
    <button onclick="window.print()">GENERATE COURT REPORT</button>
</div>

<div id="map"></div>

<div class="legend-bar">
    <span>🔵 LE</span> <span>💠 LE+K9</span> <span>🔴 SARS</span> <span>🟢 Civ</span> <span>🟣 Suspect</span> <span>⚪ Victim</span> <span>🔘 Drone</span> <span>🟠 Article</span> <span>⚫ Vehicle/Boat</span> <span>🟢 SARS Boat</span> <span>🟨 Command</span> <span>🟦 VSP</span> <span>🥇 Federal</span>
</div>

<script>
    const map = L.map('map').setView([37.5407, -77.4360], 15);
    L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}').addTo(map);

    // Drawing Engine
    const drawnItems = new L.FeatureGroup();
    map.addLayer(drawnItems);
    const drawControl = new L.Control.Draw({ edit: { featureGroup: drawnItems } });
    map.addControl(drawControl);

    function geocode() {
        const addr = document.getElementById('address').value;
        // Logic for perimeter circle and red dot placement
        const redDot = L.circleMarker([37.54, -77.43], {color: 'red', radius: 8}).addTo(map);
        const perimeter = L.circle([37.54, -77.43], {radius: 50, color: 'green'}).addTo(map);
    }

    function triggerSOS() {
        const btn = document.getElementById('sos');
        btn.innerText = "SOS ACTIVE - FLASHING";
        btn.style.animation = "blink 1s infinite";
    }

    function terminateSearch() {
        if(confirm("TERMINATE SEARCH?")) window.location.reload();
    }

    function toggleNVG(color) {
        document.getElementById('map').style.filter = (color === 'green') ? 'sepia(100%) hue-rotate(80deg)' : 'invert(100%)';
    }
</script>
</body>
</html>
