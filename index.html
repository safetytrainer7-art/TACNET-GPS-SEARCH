<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TACNET - OPERATIONAL</title>
    <style>
        html, body {
            margin: 0; padding: 0; width: 100%; height: 100%;
            display: flex; justify-content: center; background: #050505;
            font-family: sans-serif;
        }
        #app-container {
            width: 100%; max-width: 480px; height: 100vh;
            background: #064e3b;
            position: relative; overflow: hidden;
        }
        #hero-bg {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background-image: url('IMAGE FOR TAC.png2.jpg');
            background-size: cover; background-position: center;
            opacity: 0.6; z-index: 0;
        }

        /* The layers */
        .layer {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 10;
        }
        
        button {
            background: #2563eb; color: white; padding: 30px 60px;
            border: 4px solid #ffffff; border-radius: 15px;
            font-size: 1.5rem; cursor: pointer; font-weight: 900;
            text-transform: uppercase; box-shadow: 0 10px 20px rgba(0,0,0,0.5);
        }
    </style>
</head>
<body>

<div id="app-container">
    <div id="hero-bg"></div>
    
    <div class="layer" id="landing">
        <h1 style="color: white; font-size: 3rem; margin-bottom: 30px;">TACNET</h1>
        <button onclick="document.getElementById('landing').style.display='none'; document.getElementById('access').style.display='flex';">
            INITIALIZE PORTAL
        </button>
    </div>

    <div class="layer" id="access" style="display:none; background: rgba(0,0,0,0.8);">
        <h1 style="color: #fbbf24; font-size: 2.5rem;">ACCESS GRANTED</h1>
        <p style="color: white; font-size: 1.5rem;">System Active. Ready for input.</p>
    </div>
</div>

</body>
</html>
