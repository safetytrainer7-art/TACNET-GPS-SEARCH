<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TACNET | Operational Command</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; font-family: sans-serif; background: #064e3b; color: #fff; }
        .screen { display: none; height: 100vh; width: 100%; position: relative; }
        .screen.active { display: block; }
        #map { height: 100vh; width: 100vw; }
        .hud-overlay { position: absolute; top: 10px; left: 10px; z-index: 1000; background: rgba(0,0,0,0.8); padding: 15px; border: 2px solid #38bdf8; border-radius: 8px; }
        .asset-drawer { position: absolute; bottom: 20px; left: 20px; right: 20px; background: rgba(0,0,0,0.9); display: flex; padding: 10px; gap: 10px; z-index: 1000; border-radius: 5px; }
        .control-btn { background: #38bdf8; border: none; padding: 10px; cursor: pointer; font-weight: bold; }
        .error-field { border: 2px solid red; }
    </style>
</head>
<body>

    <div id="screenMap" class="screen active">
        <div id="map"></div>
        <div class="hud-overlay">
            <h3>TACNET COMMAND</h3>
            <button class="control-btn" onclick="location.reload()">RESET SYSTEM</button>
            <div id="headingReadout">000°</div>
        </div>
        <div class="asset-drawer">
            <button onclick="console.log('K9 Placed')">K9</button>
            <button onclick="console.log('LE Placed')">LE</button>
            <button onclick="console.log('SAR Placed')">SAR</button>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // PART 2: LOGIC INTEGRATION
        let map, gpsWatchId, userLocationMarker, tacticalPerimeterCircle;
        let mapCenter = [37.5407, -77.4360];
        let perimeterRadiusMeters = 500;
        let historicalLogs = [];
        let placedMarkers = [];
        let activeMapPolylines = [];
        let isPenActive = false;
        let selectedAssetType = null;
        let isMapLocked = false;

        function switchScreen(screenId) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            const target = document.getElementById(screenId);
            if (target) target.classList.add('active');
        }

        function initRealMap() {
            map = L.map('map', { center: mapCenter, zoom: 18, zoomControl: false, attributionControl: false });
            L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}').addTo(map);
            
            tacticalPerimeterCircle = L.circle(mapCenter, { 
                color: '#f97316', // Orange per request
                weight: 3, 
                radius: perimeterRadiusMeters 
            }).addTo(map);

            map.on('click', (e) => {
                if (!isPenActive && selectedAssetType) executeManualAssetPlacement(e.latlng.lat, e.latlng.lng, selectedAssetType);
            });
        }

        function executeManualAssetPlacement(lat, lng, assetType) {
            const marker = L.marker([lat, lng]).addTo(map);
            placedMarkers.push(marker);
            logEvent(`Asset Deployed: ${assetType.toUpperCase()}`);
        }

        function logEvent(message) {
            const timestamp = new Date().toLocaleTimeString();
            historicalLogs.unshift({ time: timestamp, text: message });
            console.log(`[${timestamp}] ${message}`);
        }

        window.onload = initRealMap;
    </script>
</body>
</html>
