<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TACNET COMMAND</title>
    <style>
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            background-color: #064e3b; /* Dark Hunter Green */
            display: flex; justify-content: center; align-items: center;
            font-family: sans-serif; overflow: hidden;
        }
        
        #viewport {
            width: 100%; max-width: 400px; height: 100%;
            position: relative;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
        }

        /* BRIGHTENED BACKGROUND IMAGE */
        #bg-image {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background-image: url('IMAGE FOR TAC.png2.jpg');
            background-size: cover; background-position: center;
            filter: brightness(1.7) contrast(0.9); /* Makes the image much lighter */
            z-index: -1;
        }

        .ui-box { text-align: center; color: white; width: 85%; padding: 20px; background: rgba(0,0,0,0.3); border-radius: 10px; }
        
        button {
            background: #1e40af; color: white; border: 2px solid white;
            padding: 20px 30px; font-size: 1.2rem; font-weight: bold;
            cursor: pointer; border-radius: 8px; width: 100%;
        }
    </style>
</head>
<body>

<div id="viewport">
    <div id="bg-image"></div>
    
    <!-- PAGE 1 -->
    <div id="p1" class="ui-box">
        <h1 style="font-size: 2.5rem; margin-bottom: 10px;">TACNET</h1>
        <p>MULTI-AGENCY TACTICAL COMMAND</p>
        <button onclick="document.getElementById('p1').style.display='none'; document.getElementById('p2').style.display='block';">INITIALIZE PORTAL</button>
    </div>

    <!-- PAGE 2 -->
    <div id="p2" class="ui-box" style="display:none;">
        <h1 style="color: #facc15;">ACCESS GRANTED</h1>
        <p>COMMAND LINK ESTABLISHED</p>
    </div>
</div>

</body>
</html>
